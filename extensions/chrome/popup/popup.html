<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="title-row">
        <span class="dot" title="Connected"></span>
        <span class="status-copy">Live</span>
        <span class="status-value" id="spend">$0</span>
        <span class="pending-copy"><span id="pending">0</span> pending</span>
      </div>
      <button type="button" class="open-full-btn" id="open-full" title="Open full app">Open full app ↗</button>
    </header>

    <section class="hero">
      <div class="hero-mark">✦</div>
      <div>
        <h1>Flex AI</h1>
        <p>FinOps, Flex, EzTrac, dhub-rpt squads and live metrics</p>
      </div>
      <span class="api-status" id="api-status">API off</span>
    </section>

    <section class="quick-stats" id="kpis">
      <article class="stat-card">
        <span class="label">Utilization</span>
        <span class="value" id="util">—</span>
      </article>
      <article class="stat-card">
        <span class="label">Anomalies</span>
        <span class="value" id="anomalies">0</span>
      </article>
      <article class="stat-card savings-card" id="savings-banner">
        <span class="label">Savings</span>
        <span class="value" id="savings">$23.2K/mo</span>
      </article>
      <article class="stat-card pending-card" id="pending-box">
        <span class="label">Spend trend</span>
        <span class="value sub" id="spend-change">+0% vs last month</span>
      </article>
    </section>

    <section class="actions">
      <button type="button" class="btn btn-primary" id="open-panel">Open command center</button>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" data-route="/assistant">Ask AI</button>
        <button type="button" class="btn btn-ghost" data-route="/govern/exchange">Govern</button>
        <button type="button" class="btn btn-ghost" data-route="/optimization">Savings</button>
        <button type="button" class="btn btn-ghost" data-route="/anomalies">Anomalies</button>
      </div>
    </section>

    <section class="workflow-banner hidden" id="workflow-banner">
      <div class="workflow-banner-inner">
        <span class="workflow-badge" id="workflow-badge">Approved</span>
        <div class="workflow-copy">
          <strong id="workflow-title">—</strong>
          <span id="workflow-sub">—</span>
        </div>
      </div>
    </section>

    <section class="plugin-actions">
      <div class="plugin-actions-head">
        <h2>Plugin API actions</h2>
      </div>
      <p class="plugin-actions-hint">Same actions as VS Code. Requires <code>npm run dev:api</code>.</p>
      <div class="plugin-actions-list" id="plugin-actions"></div>
    </section>

    <section class="feed">
      <h2>Recent activity</h2>
      <ul id="activity"></ul>
    </section>

    <footer class="footer">
      <span class="updated" id="updated"></span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
